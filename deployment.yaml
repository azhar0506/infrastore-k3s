apiVersion: apps/v1
kind: Deployment
metadata:
  name: infrastore
  namespace: infrastore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infrastore
  template:
    metadata:
      labels:
        app: infrastore
    spec:
      securityContext:      # section makes the pod nonroot
        runAsNonRoot: true  # enforces container to be nonroot
        runAsUser: 1000     # userid of user (not 0), 1000 is standard
        runAsGroup: 1000    # groupid of user (not 0), 1000 is standard
        fsGroup: 1000 # need this to be owned by the same group as app so it can write to pvcs
      containers:
      - name: infrastore
        image: saheerbabu/infrastore:latest
        ports:
        - containerPort: 8000
        env:
        - name: DJANGO_SUPERUSER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: infrastore-secret
              key: admin-password
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: infrastore-secret
              key: secret-key
        envFrom:
        - configMapRef:
            name: infrastore-config  # load all configmap keys as env vars
        readinessProbe:
          tcpSocket:                # using tcpSocket instead of http because theres no /healthz in the container
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:              # same reasoning as readinessProbe
          tcpSocket:
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 20
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"         # lightweight Django app doesnt need much CPU especially when idle
            memory: "128Mi"     # //
          limits:
            cpu: "500m"         # 5x the request
            memory: "256Mi"     # 2x the memory
        volumeMounts:
        - name: media
          mountPath: /app/media
        - name: db
          mountPath: /app/db
      volumes:
      - name: media
        persistentVolumeClaim:
          claimName: infrastore-media-pvc
      - name: db
        persistentVolumeClaim:
          claimName: infrastore-db-pvc

