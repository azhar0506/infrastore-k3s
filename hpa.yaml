apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: infrastore-hpa
  namespace: infrastore
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: infrastore
  minReplicas: 1
  maxReplicas: 1  # capped at 1 because SQLite doesn't support multiple writes
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

